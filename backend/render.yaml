services:
  - type: web
    name: placement-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings.prod
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: placement-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: placement-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A core worker --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings.prod
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: placement-redis
          type: redis
          property: connectionString

databases:
  - name: placement-db
    plan: free

redis:
  - name: placement-redis
    plan: free